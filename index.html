<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Heading -->
    <h1>Rock Paper Scissor</h1>

    <!-- div containing 3 choices having rock, paper, scissor -->
    <div class="choices">
        <div class="choice rock">
            <img src="./images/rock.png" alt="">
        </div>
        <div class="choice paper">
            <img src="./images/paper.png" alt="">
        </div>
        <div class="choice scissor">
            <img src="./images/scissors.png" alt="">
        </div>
    </div>

    <!-- div having score board of user and comp  -->
    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>Comp</p>
        </div>
    </div>

    <!-- div having contain a para in which we show who wins -->
    <div class="msg-container">
        <p id="msg">Play your move</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
